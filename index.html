<body>

<!-- ============ TOP NAVIGATION ============ -->
<header class="topbar">
  <div class="topbar__left">
    <div class="brand" aria-label="CodeFusion">
      <svg class="brand__mark" width="30" height="30" viewBox="0 0 30 30" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <defs>
          <linearGradient id="fusionGradient" x1="0" y1="0" x2="30" y2="30" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="var(--accent)"/>
            <stop offset="1" stop-color="var(--accent-2)"/>
          </linearGradient>
        </defs>
        <path d="M11 6L4 15L11 24" stroke="url(#fusionGradient)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M19 6L26 15L19 24" stroke="url(#fusionGradient)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
        <circle class="brand__pulse" cx="15" cy="15" r="2.6" fill="url(#fusionGradient)"/>
      </svg>
      <span class="brand__name">CodeFusion</span>
    </div>
  </div>

  <div class="topbar__center">
    <div class="select-wrap">
      <select id="languageSelect" class="lang-select" aria-label="Select programming language">
        <option value="c">C</option>
        <option value="cpp">C++</option>
        <option value="python">Python</option>
        <option value="java">Java</option>
      </select>
      <svg class="select-caret" width="10" height="6" viewBox="0 0 10 6" fill="none"><path d="M1 1L5 5L9 1" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>

    <button id="runBtn" class="run-btn" type="button">
      <span class="run-btn__shimmer" aria-hidden="true"></span>
      <svg class="run-btn__icon run-btn__icon--play" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <path d="M3.5 2.2L11.5 7L3.5 11.8V2.2Z" fill="currentColor"/>
      </svg>
      <svg class="run-btn__icon run-btn__icon--spinner" width="14" height="14" viewBox="0 0 14 14" fill="none" aria-hidden="true">
        <circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-dasharray="26 34"/>
      </svg>
      <span class="run-btn__label">Run</span>
      <kbd class="run-btn__kbd">Ctrl+&crarr;</kbd>
    </button>
  </div>

  <div class="topbar__right">
    <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle light and dark theme" title="Toggle theme">
      <svg class="icon-sun" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <circle cx="9" cy="9" r="3.6" stroke="currentColor" stroke-width="1.5"/>
        <g stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <path d="M9 1.5V3.3"/><path d="M9 14.7V16.5"/><path d="M16.5 9H14.7"/><path d="M3.3 9H1.5"/>
          <path d="M14.13 3.87L12.85 5.15"/><path d="M5.15 12.85L3.87 14.13"/>
          <path d="M14.13 14.13L12.85 12.85"/><path d="M5.15 5.15L3.87 3.87"/>
        </g>
      </svg>
      <svg class="icon-moon" width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M15.5 10.8A6.6 6.6 0 1 1 7.2 2.5a5.2 5.2 0 0 0 8.3 8.3Z" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"/>
      </svg>
    </button>

    <a class="icon-btn" href="https://github.com/Guru1316/CodeFusion-V1" target="_blank" rel="noopener noreferrer" aria-label="View on GitHub" title="View on GitHub">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
        <path d="M9 .8a8.2 8.2 0 0 0-2.6 16 .8.8 0 0 0 .55-.78v-1.55c-2.28.5-2.76-1.02-2.76-1.02-.37-.95-.9-1.2-.9-1.2-.75-.5.06-.5.06-.5.8.06 1.23.83 1.23.83.72 1.24 1.9.88 2.36.67.07-.53.28-.88.5-1.08-1.82-.2-3.74-.9-3.74-4.05 0-.9.32-1.63.83-2.2-.08-.2-.36-1.03.08-2.15 0 0 .68-.22 2.2.84a7.6 7.6 0 0 1 4 0c1.53-1.06 2.2-.84 2.2-.84.45 1.12.17 1.95.08 2.15.52.57.84 1.3.84 2.2 0 3.16-1.93 3.85-3.76 4.05.3.26.56.76.56 1.53v2.27c0 .22.15.5.56.78A8.2 8.2 0 0 0 9 .8Z" fill="currentColor"/>
      </svg>
    </a>
  </div>
</header>

<!-- ============ MAIN WORKSPACE ============ -->
<main class="workspace">
  <section class="panel panel--editor" aria-label="Code editor">
    <div class="panel__header">
      <div class="panel__title">
        <span class="file-dot" id="fileDot" aria-hidden="true"></span>
        <span id="fileName">main.c</span>
      </div>
      <span class="status-badge" id="statusBadge" data-state="idle">Ready</span>
    </div>
    <div id="editorContainer" class="editor-container"></div>
  </section>

  <div class="divider" id="panelDivider" role="separator" aria-orientation="vertical" aria-label="Resize panels" tabindex="0"></div>

  <section class="panel panel--io">
    <div class="io-block io-block--input">
      <div class="panel__header">
        <div class="panel__title"><span>Input</span></div>
        <span class="panel__hint">stdin</span>
      </div>
      <textarea id="stdinInput" class="stdin-textarea" placeholder="Enter input here..." spellcheck="false"></textarea>
    </div>

    <div class="io-resize" id="ioDivider" role="separator" aria-orientation="horizontal" aria-label="Resize input and output" tabindex="0"></div>

    <div class="io-block io-block--output">
      <div class="panel__header">
        <div class="panel__title"><span>Output</span></div>
        <div class="output-meta" id="outputMeta"></div>
      </div>
      <pre id="outputConsole" class="output-console"><span class="output-console__placeholder">Run your code to see output here.</span></pre>
    </div>
  </section>
</main>

<!-- ============ FOOTER ============ -->
<footer class="footer">
  <span>CodeFusion</span>
  <span class="footer__dot">&middot;</span>
  <span>Compile and run C, C++, Python and Java, right in your browser.</span>
</footer>
